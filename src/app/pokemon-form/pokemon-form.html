<div class="pokedex-container">
    <h2>Register New  Pokemon</h2>
    <form [formGroup]="pokemonForm" (ngSubmit)="onSubmit()" class="pokemon-form">
        <div class="form-group">
            <label for="name">Pokemon Name: </label>
            <input type="text" id = "name" formControlName = "name" placeholder="eg. Pikachu" />
        </div>

          <div class="form-group">
            <label for="name">Pokemon Type: </label>
            <input type="text" id = "name" formControlName = "name" placeholder="eg. Electro" />
        </div>

          <div class="form-group">
            <label for="name">Pokemon Level: </label>
            <input type="text" id = "name" formControlName = "name" placeholder="eg. 70" />
        </div>

          <div class="form-group">
            <label for="name">Pokemon Nature: </label>
            <input type="text" id = "name" formControlName = "name" placeholder="eg. Calm" />
        </div>

        <div class="form-actions">
            <button type = "submit" [disabled] = "pokemonForm.invalid" class = "btn-submit">Catch Pokemon</button>
        </div>
    </form>
</div>

<hr />

<h3>Current PokeDex</h3>

<div class="pokemon-grid">
    @for(p of PokemonService.pokemonList(); track p. _id){
        <div class="pokemon-card">
            <div class="card-info">
                <strong>Name: {{p.name}}</strong>
                <span>Level: {{p.level}}</span>
                <p>Type: {{p.type}} | Nature: {{p.nature}}</p>
            </div>
        </div>
    }
</div>
